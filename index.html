<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Farm Carry Playable</title>
  <style>
    :root {
      --cyan: #2ee9ff;
      --blue: #149cff;
      --green: #39d75a;
      --dark: #172130;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #05070b;
      font-family: "Arial Rounded MT Bold", "Trebuchet MS", "PingFang SC", sans-serif;
      touch-action: none;
      user-select: none;
    }

    body {
      display: grid;
      place-items: center;
    }

    #stage {
      position: relative;
      width: min(100vw, 430px);
      height: min(100vh, calc(min(100vw, 430px) * 844 / 390));
      aspect-ratio: 390 / 844;
      overflow: hidden;
      background: #64c95f;
      box-shadow: 0 20px 70px rgba(0,0,0,.65);
    }

    canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    #joystick {
      position: absolute;
      left: 24px;
      bottom: 28px;
      width: 124px;
      height: 124px;
      border-radius: 999px;
      background: radial-gradient(circle at 35% 30%, rgba(255,255,255,.32), rgba(46,233,255,.08) 40%, rgba(12,56,80,.38) 70%);
      border: 4px solid rgba(46,233,255,.7);
      box-shadow: 0 10px 24px rgba(0,0,0,.18), inset 0 2px 12px rgba(255,255,255,.22);
      touch-action: none;
    }

    #joystick::after {
      content: "";
      position: absolute;
      inset: 13px;
      border-radius: inherit;
      border: 2px dashed rgba(255,255,255,.3);
    }

    #knob {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 56px;
      height: 56px;
      border-radius: 999px;
      transform: translate(-50%, -50%);
      background: linear-gradient(180deg, #eaffff, #42dfff 48%, #0aa2e8 100%);
      border: 3px solid rgba(255,255,255,.9);
      box-shadow: 0 8px 18px rgba(0,51,95,.45), inset 0 5px 10px rgba(255,255,255,.55);
      z-index: 2;
    }

    #hint {
      position: absolute;
      right: 18px;
      bottom: 22px;
      padding: 9px 13px;
      border-radius: 16px;
      background: rgba(18, 30, 43, .58);
      color: #fff;
      font-size: 12px;
      line-height: 1.45;
      text-shadow: 0 1px 2px rgba(0,0,0,.45);
      backdrop-filter: blur(6px);
      border: 1px solid rgba(255,255,255,.15);
    }

    #winModal {
      position: absolute;
      inset: 0;
      display: none;
      place-items: center;
      background: rgba(2, 12, 20, .42);
      backdrop-filter: blur(4px);
      z-index: 5;
    }

    #winModal.show { display: grid; }

    .dialog {
      width: 82%;
      padding: 26px 20px 22px;
      text-align: center;
      border-radius: 28px;
      background: linear-gradient(180deg, #ffffff, #eef7ff 68%, #d7edff);
      border: 5px solid #fff;
      box-shadow: 0 22px 60px rgba(0,0,0,.32), inset 0 -8px 0 rgba(22,113,190,.08);
      animation: pop .36s cubic-bezier(.22, 1.45, .42, 1) both;
    }

    .badge {
      margin: -55px auto 8px;
      width: 94px;
      height: 94px;
      display: grid;
      place-items: center;
      border-radius: 999px;
      background: linear-gradient(180deg, #5dff85, #13b942);
      border: 6px solid #fff;
      box-shadow: 0 10px 24px rgba(16,129,53,.35);
      color: #fff;
      font-size: 46px;
      text-shadow: 0 3px 0 rgba(0,0,0,.18);
    }

    .dialog h1 {
      margin: 4px 0 8px;
      color: #193048;
      font-size: 28px;
      letter-spacing: .5px;
      text-shadow: 0 2px 0 #fff;
    }

    .dialog p {
      margin: 0 0 18px;
      color: #527086;
      font-size: 16px;
      font-weight: 800;
    }

    .dialog button {
      width: 190px;
      height: 58px;
      border: 0;
      border-radius: 18px;
      color: #fff;
      font-size: 22px;
      font-weight: 900;
      letter-spacing: .8px;
      background: linear-gradient(180deg, #49beff, #0b7df1);
      box-shadow: 0 8px 0 #075ab2, 0 14px 24px rgba(13,125,241,.35), inset 0 3px 0 rgba(255,255,255,.35);
    }

    .dialog button:active { transform: translateY(4px); box-shadow: 0 4px 0 #075ab2, 0 8px 18px rgba(13,125,241,.3); }

    @keyframes pop {
      from { transform: translateY(18px) scale(.82); opacity: 0; }
      to { transform: translateY(0) scale(1); opacity: 1; }
    }
  </style>
</head>
<body>
  <main id="stage">
    <canvas id="game"></canvas>
    <div id="joystick" aria-label="移动摇杆"><div id="knob"></div></div>
    <div id="hint">拖动圆盘移动<br>篮筐收蛋 → SELL换钱 → CASH提交</div>
    <div id="winModal">
      <section class="dialog">
        <div class="badge">$</div>
        <h1>目标达成！</h1>
        <p>下一关已解锁</p>
        <button id="again">继续</button>
      </section>
    </div>
  </main>

  <script>
    const W = 390;
    const H = 844;
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const joy = document.getElementById('joystick');
    const knob = document.getElementById('knob');
    const winModal = document.getElementById('winModal');
    const againBtn = document.getElementById('again');

    let dpr = Math.min(window.devicePixelRatio || 1, 2.5);
    function resize() {
      dpr = Math.min(window.devicePixelRatio || 1, 2.5);
      canvas.width = W * dpr;
      canvas.height = H * dpr;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }
    window.addEventListener('resize', resize);
    resize();

    const game = {
      money: 0,
      targetMoney: 100,
      carriedEggs: 0,
      carriedCash: 0,
      eggValue: 20,
      complete: false,
      collectTimer: 0,
      sellTimer: 0,
      cashTimer: 0,
      moneyPulse: 0,
      time: 0,
      floating: [],
      bills: [],
      eggsSpark: [],
      player: { x: 188, y: 410, r: 20, speed: 2.65, dir: 1, moving: false, bob: 0 }
    };

    const eggZone = { x: 106, y: 245, rx: 92, ry: 66 };
    const basketZone = { x: 106, y: 332, w: 92, h: 58 };
    const counterZone = { x: 284, y: 560, w: 116, h: 110 };
    const sellPad = { x: 284, y: 438, w: 116, h: 66 };
    const cashPad = { x: 182, y: 585, w: 96, h: 74 };
    const moneyTarget = { x: 272, y: 33 };

    const input = { x: 0, y: 0, active: false, keys: new Set() };

    const assetPaths = {
      grass: 'assets/grass_tile.png',
      eggField: 'assets/processed/egg_field.png',
      egg: 'assets/processed/egg_single.png',
      counter: 'assets/processed/sales_counter.png',
      cashBill: 'assets/processed/cash_bill.png',
      cashStack: 'assets/processed/cash_stack.png'
    };
    const assets = {};
    for (const [key, src] of Object.entries(assetPaths)) {
      const img = new Image();
      img.src = src;
      assets[key] = img;
    }
    function ready(name) { return assets[name] && assets[name].complete && assets[name].naturalWidth > 0; }
    function drawAsset(name, x, y, w, h, rot = 0) {
      if (!ready(name)) return false;
      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(rot);
      ctx.drawImage(assets[name], -w / 2, -h / 2, w, h);
      ctx.restore();
      return true;
    }

    function clamp(v, a, b) { return Math.max(a, Math.min(b, v)); }
    function dist(a, b, c, d) { return Math.hypot(a - c, b - d); }
    function inEllipse(px, py, z) { return ((px-z.x)**2)/(z.rx*z.rx) + ((py-z.y)**2)/(z.ry*z.ry) <= 1; }
    function inRect(px, py, z) { return px >= z.x-z.w/2 && px <= z.x+z.w/2 && py >= z.y-z.h/2 && py <= z.y+z.h/2; }
    function ease(t) { return 1 - Math.pow(1 - t, 3); }
    function isBlocked(px, py) {
      const footY = py + 30;
      const insideEggField = inEllipse(px, footY, { x: eggZone.x, y: eggZone.y, rx: eggZone.rx + 4, ry: eggZone.ry + 4 });
      const insideCounter = inRect(px, footY, { x: counterZone.x, y: counterZone.y + 8, w: 184, h: 120 });
      return insideEggField || insideCounter;
    }

    function roundRect(x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x+r, y);
      ctx.arcTo(x+w, y, x+w, y+h, r);
      ctx.arcTo(x+w, y+h, x, y+h, r);
      ctx.arcTo(x, y+h, x, y, r);
      ctx.arcTo(x, y, x+w, y, r);
      ctx.closePath();
    }

    function ellipse(x, y, rx, ry, color, shadow = true) {
      if (shadow) {
        ctx.fillStyle = 'rgba(0,0,0,.16)';
        ctx.beginPath();
        ctx.ellipse(x, y + ry * .55, rx * .92, ry * .3, 0, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.ellipse(x, y, rx, ry, 0, 0, Math.PI * 2);
      ctx.fill();
    }

    function drawEgg(x, y, s = 1) {
      if (drawAsset('egg', x, y, 28 * s, 32 * s)) return;
      ctx.save();
      ctx.translate(x, y);
      ctx.scale(s, s);
      ctx.fillStyle = 'rgba(80,58,30,.16)';
      ctx.beginPath();
      ctx.ellipse(0, 11, 14, 5, 0, 0, Math.PI*2);
      ctx.fill();
      const g = ctx.createRadialGradient(-5, -7, 2, 0, 1, 20);
      g.addColorStop(0, '#fffdf0');
      g.addColorStop(.58, '#f4edcf');
      g.addColorStop(1, '#d9c996');
      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.ellipse(0, 0, 12, 15, -.1, 0, Math.PI*2);
      ctx.fill();
      ctx.fillStyle = 'rgba(255,255,255,.75)';
      ctx.beginPath();
      ctx.ellipse(-4, -6, 3.5, 5, -.45, 0, Math.PI*2);
      ctx.fill();
      ctx.restore();
    }

    function drawMoneyBill(x, y, s = 1, rot = 0) {
      if (drawAsset('cashBill', x, y, 36 * s, 26 * s, rot)) return;
      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(rot);
      ctx.scale(s, s);
      roundRect(-15, -9, 30, 18, 3);
      ctx.fillStyle = '#43e866';
      ctx.fill();
      ctx.lineWidth = 2;
      ctx.strokeStyle = '#0fa841';
      ctx.stroke();
      ctx.fillStyle = '#d9ffe0';
      ctx.beginPath();
      ctx.arc(0, 0, 5, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#119a3c';
      ctx.font = '900 9px Arial Rounded MT Bold';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('$', 0, .5);
      ctx.restore();
    }

    function drawArrow(fromX, fromY, toX, toY) {
      const a = Math.atan2(toY - fromY, toX - fromX);
      const pulse = Math.sin(game.time * .012) * 5;
      const x = fromX + Math.cos(a) * pulse;
      const y = fromY + Math.sin(a) * pulse;
      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(a);
      ctx.shadowColor = 'rgba(36,229,255,.72)';
      ctx.shadowBlur = 12;
      ctx.fillStyle = '#2fe4ff';
      ctx.strokeStyle = '#0aaed5';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(-34, -13);
      ctx.lineTo(7, -13);
      ctx.lineTo(7, -24);
      ctx.lineTo(39, 0);
      ctx.lineTo(7, 24);
      ctx.lineTo(7, 13);
      ctx.lineTo(-34, 13);
      ctx.closePath();
      ctx.fill();
      ctx.stroke();
      ctx.restore();
    }

    function drawGround() {
      if (ready('grass')) {
        const tile = 256;
        for (let y = -20; y < H; y += tile) {
          for (let x = -20; x < W; x += tile) {
            ctx.drawImage(assets.grass, x, y, tile, tile);
          }
        }
      } else {
        const sky = ctx.createLinearGradient(0, 0, 0, H);
        sky.addColorStop(0, '#7edc65');
        sky.addColorStop(.58, '#58c65c');
        sky.addColorStop(1, '#3fbf68');
        ctx.fillStyle = sky;
        ctx.fillRect(0, 0, W, H);

        ctx.save();
        ctx.globalAlpha = .25;
        for (let i = 0; i < 120; i++) {
          const x = (i * 67) % W;
          const y = (i * 113) % H;
          ctx.fillStyle = i % 2 ? '#9cef86' : '#2f9e52';
          ctx.beginPath();
          ctx.ellipse(x, y, 2.5, 1.1, (i % 8) * .5, 0, Math.PI*2);
          ctx.fill();
        }
        ctx.restore();
      }

      ctx.fillStyle = '#e6a45a';
      ctx.beginPath();
      ctx.moveTo(-70, 548);
      ctx.bezierCurveTo(30, 505, 118, 524, 190, 584);
      ctx.bezierCurveTo(252, 636, 348, 630, 470, 568);
      ctx.lineTo(470, 820);
      ctx.bezierCurveTo(326, 760, 244, 754, 159, 790);
      ctx.bezierCurveTo(70, 828, -25, 792, -70, 720);
      ctx.closePath();
      ctx.fill();

      ctx.strokeStyle = 'rgba(255,255,255,.35)';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(-30, 570);
      ctx.bezierCurveTo(80, 538, 137, 558, 206, 612);
      ctx.stroke();
    }

    function drawFenceSegment(x1, y1, x2, y2) {
      ctx.save();
      ctx.lineCap = 'round';
      ctx.strokeStyle = '#9d5c2b';
      ctx.lineWidth = 8;
      ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
      ctx.strokeStyle = '#cf843e';
      ctx.lineWidth = 5;
      ctx.beginPath(); ctx.moveTo(x1, y1-6); ctx.lineTo(x2, y2-6); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(x1, y1+9); ctx.lineTo(x2, y2+9); ctx.stroke();
      const len = Math.hypot(x2-x1, y2-y1);
      const n = Math.floor(len / 42);
      for (let i = 0; i <= n; i++) {
        const t = i / Math.max(1, n);
        const x = x1 + (x2-x1)*t;
        const y = y1 + (y2-y1)*t;
        roundRect(x-6, y-24, 12, 46, 3);
        ctx.fillStyle = '#b7662f';
        ctx.fill();
        ctx.fillStyle = '#db9047';
        roundRect(x-4, y-22, 5, 42, 2);
        ctx.fill();
      }
      ctx.restore();
    }

    function drawFence() {
      drawFenceSegment(6, 133, 374, 72);
      drawFenceSegment(18, 350, 362, 284);
      drawFenceSegment(18, 487, 220, 450);
      drawFenceSegment(322, 420, 390, 404);
    }

    function drawEggZone() {
      ctx.save();
      if (!drawAsset('eggField', eggZone.x + 15, eggZone.y - 2, 250, 153)) {
        ctx.fillStyle = 'rgba(10, 76, 90, .28)';
        roundRect(eggZone.x - eggZone.rx - 7, eggZone.y - eggZone.ry - 7, eggZone.rx*2+14, eggZone.ry*2+14, 22);
        ctx.fill();
        ctx.fillStyle = '#3c3930';
        roundRect(eggZone.x - eggZone.rx, eggZone.y - eggZone.ry, eggZone.rx*2, eggZone.ry*2, 20);
        ctx.fill();
        ctx.strokeStyle = '#2ca6d8';
        ctx.lineWidth = 4;
        ctx.stroke();
        const pattern = [
          [-58,-30],[-24,-36],[10,-34],[42,-24],[62,6],[30,12],[-8,18],[-44,16],[-70,2],
          [-46,42],[-10,48],[26,43],[58,34],[-22,-2],[14,-3],[50,-2]
        ];
        for (const p of pattern) drawEgg(eggZone.x + p[0], eggZone.y + p[1], .85);
      }

      ctx.restore();
    }

    function drawCounter() {
      ctx.save();
      ctx.fillStyle = '#fff';
      ctx.strokeStyle = '#26dfff';
      ctx.lineWidth = 4;
      ctx.setLineDash([12, 8]);
      roundRect(sellPad.x - sellPad.w/2, sellPad.y - sellPad.h/2, sellPad.w, sellPad.h, 13);
      ctx.stroke();
      roundRect(cashPad.x - cashPad.w/2, cashPad.y - cashPad.h/2, cashPad.w, cashPad.h, 13);
      ctx.stroke();
      ctx.setLineDash([]);

      ctx.fillStyle = '#1fcdf3';
      ctx.font = '900 27px Arial Rounded MT Bold';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.save();
      ctx.translate(sellPad.x, sellPad.y);
      ctx.rotate(-.1);
      ctx.fillText('SELL', 0, 2);
      ctx.restore();
      ctx.fillStyle = '#1fcdf3';
      ctx.font = '900 21px Arial Rounded MT Bold';
      ctx.fillText('CASH', cashPad.x, cashPad.y + 28);

      if (!drawAsset('counter', counterZone.x, counterZone.y + 2, 150, 137)) {
        ctx.fillStyle = 'rgba(0,0,0,.18)';
        ctx.beginPath();
        ctx.ellipse(counterZone.x, counterZone.y + 76, 88, 25, 0, 0, Math.PI*2);
        ctx.fill();

        ctx.fillStyle = '#9b4e36';
        roundRect(counterZone.x - 76, counterZone.y - 10, 152, 64, 8);
        ctx.fill();
        ctx.fillStyle = '#c86d40';
        roundRect(counterZone.x - 68, counterZone.y - 2, 132, 45, 7);
        ctx.fill();
        const top = ctx.createLinearGradient(0, counterZone.y - 44, 0, counterZone.y + 2);
        top.addColorStop(0, '#9dd7f5');
        top.addColorStop(1, '#4e9cc9');
        ctx.fillStyle = top;
        roundRect(counterZone.x - 83, counterZone.y - 48, 166, 45, 9);
        ctx.fill();
        ctx.strokeStyle = 'rgba(255,255,255,.42)';
        ctx.lineWidth = 3;
        ctx.stroke();

        ctx.fillStyle = '#79838e';
        roundRect(counterZone.x + 26, counterZone.y - 72, 40, 27, 5);
        ctx.fill();
        ctx.fillStyle = '#59616d';
        roundRect(counterZone.x + 32, counterZone.y - 86, 24, 16, 4);
        ctx.fill();
        ctx.fillStyle = '#ffd870';
        ctx.fillRect(counterZone.x + 35, counterZone.y - 66, 7, 4);
        ctx.fillRect(counterZone.x + 48, counterZone.y - 66, 7, 4);

        ctx.fillStyle = '#f0c77d';
        roundRect(counterZone.x - 75, counterZone.y - 70, 54, 31, 8);
        ctx.fill();
        for (let i = 0; i < 5; i++) drawEgg(counterZone.x - 60 + (i%3)*14, counterZone.y - 61 + Math.floor(i/3)*11, .5);
      }
      ctx.restore();
    }

    function drawInteractionPads() {
      const p = game.player;
      ctx.save();
      ctx.strokeStyle = 'rgba(47,233,255,.9)';
      ctx.lineWidth = 4;
      ctx.setLineDash([14, 10]);
      ctx.shadowColor = 'rgba(47,233,255,.75)';
      ctx.shadowBlur = 13;
      if (game.carriedEggs > 0) {
        roundRect(sellPad.x - sellPad.w/2, sellPad.y - sellPad.h/2, sellPad.w, sellPad.h, 14);
        ctx.stroke();
        drawArrow(p.x + 24, p.y - 20, sellPad.x, sellPad.y - 16);
      } else if (game.carriedCash > 0) {
        roundRect(cashPad.x - cashPad.w/2, cashPad.y - cashPad.h/2, cashPad.w, cashPad.h, 14);
        ctx.stroke();
        drawArrow(p.x + 20, p.y - 24, cashPad.x, cashPad.y - 10);
      } else {
        roundRect(basketZone.x - basketZone.w/2, basketZone.y - basketZone.h/2, basketZone.w, basketZone.h, 14);
        ctx.stroke();
        drawArrow(p.x + 20, p.y - 30, basketZone.x, basketZone.y - 10);
      }
      ctx.restore();
    }

    function drawPlayer() {
      const p = game.player;
      const bob = p.moving ? Math.sin(game.time * .03) * 3 : 0;
      ctx.save();
      ctx.translate(p.x, p.y + bob);
      if (p.dir < 0) ctx.scale(-1, 1);

      ctx.fillStyle = 'rgba(0,0,0,.2)';
      ctx.beginPath();
      ctx.ellipse(0, 35 - bob, 24, 9, 0, 0, Math.PI*2);
      ctx.fill();

      ctx.strokeStyle = '#275073';
      ctx.lineWidth = 7;
      ctx.lineCap = 'round';
      ctx.beginPath(); ctx.moveTo(-8, 25); ctx.lineTo(-15, 50); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(8, 25); ctx.lineTo(16, 49); ctx.stroke();
      ctx.strokeStyle = '#f0c4a1';
      ctx.lineWidth = 6;
      ctx.beginPath(); ctx.moveTo(-17, 50); ctx.lineTo(-25, 51); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(17, 49); ctx.lineTo(25, 47); ctx.stroke();

      ctx.fillStyle = '#f7f5e8';
      roundRect(-14, -2, 28, 31, 9);
      ctx.fill();
      ctx.strokeStyle = '#e95e7d';
      ctx.lineWidth = 5;
      ctx.beginPath(); ctx.moveTo(-9, 2); ctx.lineTo(-6, 27); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(9, 2); ctx.lineTo(6, 27); ctx.stroke();

      ctx.strokeStyle = '#f0c4a1';
      ctx.lineWidth = 6;
      ctx.beginPath(); ctx.moveTo(-13, 5); ctx.lineTo(-25, 22); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(13, 5); ctx.lineTo(25, 18); ctx.stroke();

      ctx.fillStyle = '#efbd93';
      ctx.beginPath();
      ctx.ellipse(0, -16, 14, 16, 0, 0, Math.PI*2);
      ctx.fill();
      ctx.fillStyle = '#9d4d27';
      ctx.beginPath();
      ctx.ellipse(-3, -28, 18, 11, -.25, 0, Math.PI*2);
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(9, -20, 8, 13, -.35, 0, Math.PI*2);
      ctx.fill();
      ctx.fillStyle = '#5a2e22';
      ctx.beginPath(); ctx.arc(-4, -16, 1.6, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(6, -16, 1.6, 0, Math.PI*2); ctx.fill();
      ctx.strokeStyle = '#a75243';
      ctx.lineWidth = 1.6;
      ctx.beginPath(); ctx.arc(1, -10, 5, .2, Math.PI-.2); ctx.stroke();

      if (game.carriedEggs > 0) {
        const eggX = game.carriedCash > 0 ? -16 : 0;
        for (let i = 0; i < game.carriedEggs; i++) {
          drawEgg(eggX, -44 - i * 12, .46);
        }
      }
      if (game.carriedCash > 0) {
        const cashX = game.carriedEggs > 0 ? 18 : 0;
        for (let i = 0; i < game.carriedCash; i++) {
          drawMoneyBill(cashX, -45 - i * 10, .5, -.08);
        }
      }
      ctx.restore();
    }

    function drawHud() {
      ctx.save();
      ctx.fillStyle = 'rgba(0,0,0,.23)';
      roundRect(154, 18, 215, 48, 22);
      ctx.fill();
      const g = ctx.createLinearGradient(154, 18, 154, 66);
      g.addColorStop(0, '#1d2b35');
      g.addColorStop(1, '#0b1119');
      ctx.fillStyle = g;
      roundRect(160, 16, 206, 48, 22);
      ctx.fill();
      drawMoneyBill(181, 40, 1.25, -.05);
      ctx.fillStyle = '#fff';
      ctx.font = `900 ${game.moneyPulse > 0 ? 29 : 26}px Arial Rounded MT Bold`;
      ctx.textAlign = 'left';
      ctx.textBaseline = 'middle';
      ctx.shadowColor = 'rgba(0,0,0,.45)';
      ctx.shadowBlur = 3;
      ctx.fillText(`${game.money}`, 215, 40);
      ctx.fillStyle = '#95d3a0';
      ctx.font = '900 15px Arial Rounded MT Bold';
      ctx.fillText(`/ ${game.targetMoney}`, 300, 41);

      ctx.fillStyle = 'rgba(255,255,255,.93)';
      roundRect(16, 20, 108, 55, 15);
      ctx.fill();
      ctx.fillStyle = '#1b82e8';
      roundRect(19, 23, 102, 49, 13);
      ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.font = '900 18px Arial Rounded MT Bold';
      ctx.textAlign = 'center';
      ctx.fillText('EGG FARM', 70, 48);
      ctx.restore();
    }

    function drawFloating() {
      ctx.save();
      for (const f of game.floating) {
        ctx.globalAlpha = f.life;
        ctx.fillStyle = f.color;
        ctx.font = '900 21px Arial Rounded MT Bold';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.shadowColor = 'rgba(0,0,0,.35)';
        ctx.shadowBlur = 4;
        ctx.fillText(f.text, f.x, f.y);
      }
      ctx.restore();

      for (const b of game.bills) drawMoneyBill(b.x, b.y, b.s, b.rot);

      for (const s of game.eggsSpark) {
        ctx.save();
        ctx.globalAlpha = s.life;
        drawEgg(s.x, s.y, s.s);
        ctx.restore();
      }
    }

    function update(dt) {
      if (game.complete) return;
      game.time += dt * 16.67;
      game.collectTimer -= dt * 16.67;
      game.sellTimer -= dt * 16.67;
      game.cashTimer -= dt * 16.67;
      game.moneyPulse = Math.max(0, game.moneyPulse - dt * 16.67);

      const keyX = (input.keys.has('ArrowRight') || input.keys.has('d') ? 1 : 0) - (input.keys.has('ArrowLeft') || input.keys.has('a') ? 1 : 0);
      const keyY = (input.keys.has('ArrowDown') || input.keys.has('s') ? 1 : 0) - (input.keys.has('ArrowUp') || input.keys.has('w') ? 1 : 0);
      let vx = input.x + keyX;
      let vy = input.y + keyY;
      const len = Math.hypot(vx, vy);
      if (len > 1) { vx /= len; vy /= len; }

      const p = game.player;
      p.moving = Math.hypot(vx, vy) > .05;
      if (p.moving) {
        p.dir = vx < -.05 ? -1 : vx > .05 ? 1 : p.dir;
        const nx = clamp(p.x + vx * p.speed * dt, 28, W - 28);
        const ny = clamp(p.y + vy * p.speed * dt, 105, H - 130);
        if (!isBlocked(nx, ny)) {
          p.x = nx;
          p.y = ny;
        } else {
          if (!isBlocked(nx, p.y)) p.x = nx;
          if (!isBlocked(p.x, ny)) p.y = ny;
        }
      }

      if (inRect(p.x, p.y + 25, basketZone) && game.carriedCash === 0 && game.collectTimer <= 0) {
        game.collectTimer = 500;
        game.carriedEggs++;
        game.eggsSpark.push({ x: basketZone.x + (Math.random()-.5)*50, y: basketZone.y - 12, vx: (p.x-basketZone.x)/28, vy: -1.9, life: 1, s: .55 });
        game.floating.push({ x: p.x, y: p.y - 76, text: `EGG x${game.carriedEggs}`, color: '#fff6bd', life: 1, vy: -1.1 });
      }

      if (inRect(p.x, p.y + 25, sellPad) && game.carriedEggs > 0 && game.sellTimer <= 0) {
        game.sellTimer = 300;
        game.carriedEggs--;
        game.carriedCash++;
        game.floating.push({ x: sellPad.x, y: sellPad.y - 50, text: `BILL x${game.carriedCash}`, color: '#52ff72', life: 1, vy: -1.25 });
        game.bills.push({ x: sellPad.x - 12 + Math.random()*24, y: sellPad.y - 28, tx: p.x, ty: p.y - 62, life: 0, s: .85, rot: (Math.random()-.5)*.7, mode: 'toPlayer' });
      }

      if (inRect(p.x, p.y + 25, cashPad) && game.carriedCash > 0 && game.cashTimer <= 0) {
        game.cashTimer = 260;
        game.carriedCash--;
        game.money += game.eggValue;
        game.moneyPulse = 190;
        game.floating.push({ x: cashPad.x, y: cashPad.y - 56, text: `+$${game.eggValue}`, color: '#52ff72', life: 1, vy: -1.45 });
        game.bills.push({ x: cashPad.x - 10 + Math.random()*20, y: cashPad.y - 32, tx: moneyTarget.x, ty: moneyTarget.y, life: 0, s: 1, rot: (Math.random()-.5)*.7, mode: 'toHud' });
        if (game.money >= game.targetMoney) {
          game.complete = true;
          setTimeout(() => winModal.classList.add('show'), 450);
        }
      }

      for (const f of game.floating) { f.y += f.vy * dt; f.life -= .018 * dt; }
      game.floating = game.floating.filter(f => f.life > 0);

      for (const b of game.bills) {
        b.life += .036 * dt;
        const t = clamp(b.life, 0, 1);
        b.x = b.x + (b.tx - b.x) * .1 * dt;
        b.y = b.y + (b.ty - b.y) * .1 * dt - Math.sin(t*Math.PI) * .6;
        b.s = Math.max(.45, b.s - t * .02);
        b.rot += .08 * dt;
      }
      game.bills = game.bills.filter(b => b.life < 1.12);

      for (const s of game.eggsSpark) { s.x += s.vx * dt; s.y += s.vy * dt; s.life -= .035 * dt; s.vy += .04 * dt; }
      game.eggsSpark = game.eggsSpark.filter(s => s.life > 0);
    }

    function render() {
      ctx.clearRect(0, 0, W, H);
      drawGround();
      drawFence();
      drawEggZone();
      drawCounter();
      drawInteractionPads();
      drawPlayer();
      drawFloating();
      drawHud();
    }

    let last = performance.now();
    function loop(now) {
      const dt = Math.min(2.2, (now - last) / 16.67);
      last = now;
      update(dt);
      render();
      requestAnimationFrame(loop);
    }
    requestAnimationFrame(loop);

    function setJoy(clientX, clientY) {
      const r = joy.getBoundingClientRect();
      const cx = r.left + r.width / 2;
      const cy = r.top + r.height / 2;
      const max = r.width * .33;
      let dx = clientX - cx;
      let dy = clientY - cy;
      const l = Math.hypot(dx, dy);
      if (l > max) { dx = dx / l * max; dy = dy / l * max; }
      input.x = dx / max;
      input.y = dy / max;
      knob.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
    }

    function resetJoy() {
      input.x = 0;
      input.y = 0;
      input.active = false;
      knob.style.transform = 'translate(-50%, -50%)';
    }

    joy.addEventListener('pointerdown', e => {
      input.active = true;
      joy.setPointerCapture(e.pointerId);
      setJoy(e.clientX, e.clientY);
    });
    joy.addEventListener('pointermove', e => { if (input.active) setJoy(e.clientX, e.clientY); });
    joy.addEventListener('pointerup', resetJoy);
    joy.addEventListener('pointercancel', resetJoy);

    window.addEventListener('keydown', e => input.keys.add(e.key));
    window.addEventListener('keyup', e => input.keys.delete(e.key));

    againBtn.addEventListener('click', () => {
      game.money = 0;
      game.carriedEggs = 0;
      game.carriedCash = 0;
      game.complete = false;
      game.player.x = 188;
      game.player.y = 410;
      game.floating = [];
      game.bills = [];
      game.eggsSpark = [];
      winModal.classList.remove('show');
    });
  </script>
</body>
</html>
