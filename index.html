<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Farm Carry Playable</title>
  <style>
    :root {
      --cyan: #2ee9ff;
      --blue: #149cff;
      --green: #39d75a;
      --dark: #172130;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #05070b;
      font-family: "Arial Rounded MT Bold", "Trebuchet MS", "PingFang SC", sans-serif;
      touch-action: none;
      user-select: none;
    }

    body {
      display: grid;
      place-items: center;
    }

    #stage {
      position: relative;
      width: min(100vw, 430px);
      height: min(100vh, calc(min(100vw, 430px) * 1080 / 608));
      aspect-ratio: 608 / 1080;
      overflow: hidden;
      background: #64c95f;
      box-shadow: 0 20px 70px rgba(0,0,0,.65);
    }

    canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    #joystick {
      position: absolute;
      left: 24px;
      bottom: 28px;
      width: 124px;
      height: 124px;
      border-radius: 999px;
      background: radial-gradient(circle at 35% 30%, rgba(255,255,255,.32), rgba(46,233,255,.08) 40%, rgba(12,56,80,.38) 70%);
      border: 4px solid rgba(46,233,255,.7);
      box-shadow: 0 10px 24px rgba(0,0,0,.18), inset 0 2px 12px rgba(255,255,255,.22);
      touch-action: none;
    }

    #joystick::after {
      content: "";
      position: absolute;
      inset: 13px;
      border-radius: inherit;
      border: 2px dashed rgba(255,255,255,.3);
    }

    #knob {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 56px;
      height: 56px;
      border-radius: 999px;
      transform: translate(-50%, -50%);
      background: linear-gradient(180deg, #eaffff, #42dfff 48%, #0aa2e8 100%);
      border: 3px solid rgba(255,255,255,.9);
      box-shadow: 0 8px 18px rgba(0,51,95,.45), inset 0 5px 10px rgba(255,255,255,.55);
      z-index: 2;
    }

    #hint {
      position: absolute;
      right: 18px;
      bottom: 22px;
      padding: 9px 13px;
      border-radius: 16px;
      background: rgba(18, 30, 43, .58);
      color: #fff;
      font-size: 12px;
      line-height: 1.45;
      text-shadow: 0 1px 2px rgba(0,0,0,.45);
      backdrop-filter: blur(6px);
      border: 1px solid rgba(255,255,255,.15);
    }

    #winModal {
      position: absolute;
      inset: 0;
      display: none;
      place-items: center;
      background: rgba(2, 12, 20, .42);
      backdrop-filter: blur(4px);
      z-index: 5;
    }

    #winModal.show { display: grid; }

    .dialog {
      width: 82%;
      padding: 26px 20px 22px;
      text-align: center;
      border-radius: 28px;
      background: linear-gradient(180deg, #ffffff, #eef7ff 68%, #d7edff);
      border: 5px solid #fff;
      box-shadow: 0 22px 60px rgba(0,0,0,.32), inset 0 -8px 0 rgba(22,113,190,.08);
      animation: pop .36s cubic-bezier(.22, 1.45, .42, 1) both;
    }

    .badge {
      margin: -55px auto 8px;
      width: 94px;
      height: 94px;
      display: grid;
      place-items: center;
      border-radius: 999px;
      background: linear-gradient(180deg, #5dff85, #13b942);
      border: 6px solid #fff;
      box-shadow: 0 10px 24px rgba(16,129,53,.35);
      color: #fff;
      font-size: 46px;
      text-shadow: 0 3px 0 rgba(0,0,0,.18);
    }

    .dialog h1 {
      margin: 4px 0 8px;
      color: #193048;
      font-size: 28px;
      letter-spacing: .5px;
      text-shadow: 0 2px 0 #fff;
    }

    .dialog p {
      margin: 0 0 18px;
      color: #527086;
      font-size: 16px;
      font-weight: 800;
    }

    .dialog button {
      width: 190px;
      height: 58px;
      border: 0;
      border-radius: 18px;
      color: #fff;
      font-size: 22px;
      font-weight: 900;
      letter-spacing: .8px;
      background: linear-gradient(180deg, #49beff, #0b7df1);
      box-shadow: 0 8px 0 #075ab2, 0 14px 24px rgba(13,125,241,.35), inset 0 3px 0 rgba(255,255,255,.35);
    }

    .dialog button:active { transform: translateY(4px); box-shadow: 0 4px 0 #075ab2, 0 8px 18px rgba(13,125,241,.3); }

    @keyframes pop {
      from { transform: translateY(18px) scale(.82); opacity: 0; }
      to { transform: translateY(0) scale(1); opacity: 1; }
    }
  </style>
</head>
<body>
  <main id="stage">
    <canvas id="game"></canvas>
    <div id="joystick" aria-label="移动摇杆"><div id="knob"></div></div>
    <div id="hint">拖动圆盘移动<br>篮筐收蛋 → SELL换钱 → CASH提交</div>
    <div id="winModal">
      <section class="dialog">
        <div class="badge">$</div>
        <h1>目标达成！</h1>
        <p>下一关已解锁</p>
        <button id="again">继续</button>
      </section>
    </div>
  </main>

  <script>
    const W = 608;
    const H = 1080;
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const joy = document.getElementById('joystick');
    const knob = document.getElementById('knob');
    const winModal = document.getElementById('winModal');
    const againBtn = document.getElementById('again');

    let dpr = Math.min(window.devicePixelRatio || 1, 2.5);
    function resize() {
      dpr = Math.min(window.devicePixelRatio || 1, 2.5);
      canvas.width = W * dpr;
      canvas.height = H * dpr;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }
    window.addEventListener('resize', resize);
    resize();

    const game = {
      money: 0,
      targetMoney: 1000,
      carriedEggs: 0,
      carriedCash: 0,
      stationEggs: 0,
      trayEggs: 0,
      orderEggs: 0,
      packTimer: 0,
      packState: 'idle',
      cashStacks: [],
      carState: 'waiting',
      carX: 112,
      carY: 755,
      carDelay: 0,
      carPhase: 'down',
      departingCars: [],
      eggValue: 20,
      complete: false,
      collectTimer: 0,
      sellTimer: 0,
      cashTimer: 0,
      eggBatchTimer: 0,
      moneyPulse: 0,
      time: 0,
      floating: [],
      bills: [],
      eggsSpark: [],
      productionEggs: [],
      nextEggId: 1,
      player: { x: 420, y: 620, r: 20, speed: 3.25, dir: 1, moving: false, bob: 0 }
    };

    const eggZone = { x: 455, y: 258, rx: 170, ry: 120 };
    const eggBlockZone = { x: 455, y: 258, rx: 150, ry: 104 };
    const basketZone = { x: 430, y: 400, w: 320, h: 140 };
    const counterZone = { x: 278, y: 604, w: 244, h: 176 };
    const counterBlock = { x: 225, y: 650, w: 300, h: 105 };
    const sellPad = { x: 330, y: 600, w: 135, h: 120 };
    const cashPad = { x: 455, y: 675, w: 150, h: 120 };
    const moneyTarget = { x: 414, y: 38 };
    const playableArea = [
      { x: 0, y: 335 },
      { x: 608, y: 78 },
      { x: 608, y: 780 },
      { x: 445, y: 715 },
      { x: 260, y: 632 },
      { x: 90, y: 548 },
      { x: 0, y: 500 }
    ];

    const input = { x: 0, y: 0, active: false, keys: new Set() };

    const assetPaths = {
      background: 'assets/background-new.png',
      egg: 'assets/processed/egg_single.png',
      cashBill: 'assets/processed/cash_bill.png',
      cashStack: 'assets/cash_stack_double.png?v=20260512-1100',
      playerAvatar: 'assets/processed/player_avatar.png',
      topCar: 'assets/processed/car_empty_horizontal.png',
      carEmpty: 'assets/processed/car_empty.png',
      carFull: 'assets/processed/car_full.png',
      carFullHorizontal: 'assets/processed/car_full_horizontal.png',
      trayEmpty: 'assets/processed/empy_egg.png',
      trayHalf: 'assets/processed/half_egg.png',
      trayFull: 'assets/processed/full_egg.png',
      bubbleWhite: 'assets/processed/order_bubble_white.png',
      bubbleHalf: 'assets/processed/order_bubble_half_green.png',
      bubbleGreen: 'assets/processed/order_bubble_green.png',
      logo: 'assets/processed/townfab_logo.png',
      cashColumn: 'assets/processed/cash_colomn.png'
    };
    const assets = {};
    for (const [key, src] of Object.entries(assetPaths)) {
      const img = new Image();
      img.src = src;
      assets[key] = img;
    }
    function ready(name) { return assets[name] && assets[name].complete && assets[name].naturalWidth > 0; }
    function drawAsset(name, x, y, w, h, rot = 0) {
      if (!ready(name)) return false;
      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(rot);
      ctx.drawImage(assets[name], -w / 2, -h / 2, w, h);
      ctx.restore();
      return true;
    }

    const eggSlots = [
      {x:420,y:150,s:.72},{x:462,y:145,s:.72},{x:506,y:145,s:.72},{x:550,y:150,s:.72},{x:590,y:158,s:.72},
      {x:382,y:182,s:.78},{x:425,y:178,s:.78},{x:468,y:176,s:.78},{x:512,y:178,s:.78},{x:556,y:184,s:.78},{x:596,y:192,s:.78},
      {x:356,y:222,s:.84},{x:400,y:214,s:.84},{x:444,y:210,s:.84},{x:490,y:214,s:.84},{x:536,y:222,s:.84},{x:580,y:232,s:.84},
      {x:350,y:265,s:.9},{x:396,y:255,s:.9},{x:442,y:250,s:.9},{x:490,y:255,s:.9},{x:538,y:266,s:.9},{x:585,y:282,s:.9},
      {x:366,y:310,s:.96},{x:414,y:300,s:.96},{x:462,y:294,s:.96},{x:512,y:302,s:.96},{x:560,y:318,s:.96},
      {x:390,y:350,s:1},{x:442,y:342,s:1},{x:494,y:344,s:1},{x:546,y:360,s:1},
      {x:420,y:386,s:1.04},{x:478,y:384,s:1.04},{x:535,y:396,s:1.04}
    ];
    const eggBatchSize = 35;
    const eggBatchInterval = 10000;
    const collectInterval = 120;
    const maxCarriedEggs = 30;
    const trayEggPositions = [
      { x: 250, y: 560 },
      { x: 286, y: 568 },
      { x: 274, y: 604 }
    ];
    const topCar = { x: 126, y: 112, w: 245, h: 168 };
    const deliveryCarStart = { x: 116, y: 758 };
    const deliveryCarSize = { w: 260, h: 174 };
    const trayDisplay = { x: 236, y: 590, w: 118, h: 100 };
    const stationEggOrigin = { x: 170, y: 560 };
    const stationEggSpacing = { x: 34, y: 19 };
    const cashStackOrigin = { x: 500, y: 735 };
    const cashStackSpacing = { x: 38, y: 5 };
    const cashStackColumnDrop = 10;
    const maxVisibleCashStacks = 50;
    const cashStackRotation = 0;
    const cashPerStack = 20;
    const bubbleDisplay = { x: 150, y: 655, w: 138, h: 110 };
    const logoDisplay = { x: 118, y: 38, w: 205, h: 80 };
    const cashDisplay = { x: 410, y: 38, w: 245, h: 50 };

    function spawnEggBatch(count = eggBatchSize) {
      const occupied = new Set(game.productionEggs.map(e => e.slot));
      const free = eggSlots.map((_, i) => i).filter(i => !occupied.has(i));
      for (let i = 0; i < Math.min(count, free.length); i++) {
        const slotIndex = free[i];
        const slot = eggSlots[slotIndex];
        game.productionEggs.push({
          id: game.nextEggId++,
          slot: slotIndex,
          x: slot.x,
          y: slot.y,
          s: slot.s,
          born: game.time + i * 45
        });
      }
      game.productionEggs.sort((a, b) => a.y - b.y);
    }

    function clamp(v, a, b) { return Math.max(a, Math.min(b, v)); }
    function dist(a, b, c, d) { return Math.hypot(a - c, b - d); }
    function inEllipse(px, py, z) { return ((px-z.x)**2)/(z.rx*z.rx) + ((py-z.y)**2)/(z.ry*z.ry) <= 1; }
    function inRect(px, py, z) { return px >= z.x-z.w/2 && px <= z.x+z.w/2 && py >= z.y-z.h/2 && py <= z.y+z.h/2; }
    function inPolygon(px, py, points) {
      let inside = false;
      for (let i = 0, j = points.length - 1; i < points.length; j = i++) {
        const xi = points[i].x, yi = points[i].y;
        const xj = points[j].x, yj = points[j].y;
        const hit = ((yi > py) !== (yj > py)) && (px < (xj - xi) * (py - yi) / (yj - yi) + xi);
        if (hit) inside = !inside;
      }
      return inside;
    }
    function ease(t) { return 1 - Math.pow(1 - t, 3); }
    function eggBlockRatio(px, py) {
      const footY = py + 30;
      return ((px - eggBlockZone.x) ** 2) / (eggBlockZone.rx * eggBlockZone.rx) + ((footY - eggBlockZone.y) ** 2) / (eggBlockZone.ry * eggBlockZone.ry);
    }

    function isBlocked(px, py) {
      const footY = py + 30;
      const outsideGrass = !inPolygon(px, footY, playableArea);
      const insideEggField = eggBlockRatio(px, py) <= 1;
      const insideCounter = inRect(px, footY, counterBlock);
      return outsideGrass || insideEggField || insideCounter;
    }

    spawnEggBatch();

    function roundRect(x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x+r, y);
      ctx.arcTo(x+w, y, x+w, y+h, r);
      ctx.arcTo(x+w, y+h, x, y+h, r);
      ctx.arcTo(x, y+h, x, y, r);
      ctx.arcTo(x, y, x+w, y, r);
      ctx.closePath();
    }

    function ellipse(x, y, rx, ry, color, shadow = true) {
      if (shadow) {
        ctx.fillStyle = 'rgba(0,0,0,.16)';
        ctx.beginPath();
        ctx.ellipse(x, y + ry * .55, rx * .92, ry * .3, 0, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.ellipse(x, y, rx, ry, 0, 0, Math.PI * 2);
      ctx.fill();
    }

    function drawEgg(x, y, s = 1) {
      if (drawAsset('egg', x, y, 28 * s, 32 * s)) return;
      ctx.save();
      ctx.translate(x, y);
      ctx.scale(s, s);
      ctx.fillStyle = 'rgba(80,58,30,.16)';
      ctx.beginPath();
      ctx.ellipse(0, 11, 14, 5, 0, 0, Math.PI*2);
      ctx.fill();
      const g = ctx.createRadialGradient(-5, -7, 2, 0, 1, 20);
      g.addColorStop(0, '#fffdf0');
      g.addColorStop(.58, '#f4edcf');
      g.addColorStop(1, '#d9c996');
      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.ellipse(0, 0, 12, 15, -.1, 0, Math.PI*2);
      ctx.fill();
      ctx.fillStyle = 'rgba(255,255,255,.75)';
      ctx.beginPath();
      ctx.ellipse(-4, -6, 3.5, 5, -.45, 0, Math.PI*2);
      ctx.fill();
      ctx.restore();
    }

    function drawMoneyBill(x, y, s = 1, rot = 0) {
      if (drawAsset('cashBill', x, y, 46 * s, 35 * s, rot)) return;
      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(rot);
      ctx.scale(s, s);
      roundRect(-15, -9, 30, 18, 3);
      ctx.fillStyle = '#43e866';
      ctx.fill();
      ctx.lineWidth = 2;
      ctx.strokeStyle = '#0fa841';
      ctx.stroke();
      ctx.fillStyle = '#d9ffe0';
      ctx.beginPath();
      ctx.arc(0, 0, 5, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#119a3c';
      ctx.font = '900 9px Arial Rounded MT Bold';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('$', 0, .5);
      ctx.restore();
    }

    function drawArrow(fromX, fromY, toX, toY) {
      const a = Math.atan2(toY - fromY, toX - fromX);
      const pulse = Math.sin(game.time * .012) * 5;
      const x = fromX + Math.cos(a) * pulse;
      const y = fromY + Math.sin(a) * pulse;
      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(a);
      ctx.shadowColor = 'rgba(36,229,255,.72)';
      ctx.shadowBlur = 12;
      ctx.fillStyle = '#2fe4ff';
      ctx.strokeStyle = '#0aaed5';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(-34, -13);
      ctx.lineTo(7, -13);
      ctx.lineTo(7, -24);
      ctx.lineTo(39, 0);
      ctx.lineTo(7, 24);
      ctx.lineTo(7, 13);
      ctx.lineTo(-34, 13);
      ctx.closePath();
      ctx.fill();
      ctx.stroke();
      ctx.restore();
    }

    function drawGround() {
      if (ready('background')) {
        ctx.drawImage(assets.background, 0, 0, W, H);
      } else {
        const sky = ctx.createLinearGradient(0, 0, 0, H);
        sky.addColorStop(0, '#7edc65');
        sky.addColorStop(.58, '#58c65c');
        sky.addColorStop(1, '#3fbf68');
        ctx.fillStyle = sky;
        ctx.fillRect(0, 0, W, H);
      }
    }

    function drawVehiclesAndOrder() {
      drawAsset('topCar', topCar.x, topCar.y, topCar.w, topCar.h);

      drawAsset(game.orderEggs >= 4 ? 'carFull' : 'carEmpty', deliveryCarStart.x, deliveryCarStart.y, deliveryCarSize.w, deliveryCarSize.h);
      for (const car of game.departingCars) {
        drawAsset('carFull', car.x, car.y, deliveryCarSize.w, deliveryCarSize.h);
      }


    }

    function drawTrayEggs() {
      const trayAsset = game.orderEggs >= 4 ? 'trayFull' : game.orderEggs >= 2 ? 'trayHalf' : 'trayEmpty';
      const scale = trayAsset === 'trayEmpty' ? 0.9 : 1;
      drawAsset(trayAsset, trayDisplay.x, trayDisplay.y, trayDisplay.w * scale, trayDisplay.h * scale);
    }

    function getStationEggPosition(index) {
      const row = Math.floor(index / 2);
      const col = index % 2;
      return {
        x: stationEggOrigin.x + (col === 0 ? -stationEggSpacing.x / 2 : stationEggSpacing.x / 2),
        y: stationEggOrigin.y - row * stationEggSpacing.y
      };
    }

    function getCashStackPosition(index) {
      const row = Math.floor(index / 2);
      const col = index % 2;
      return {
        x: cashStackOrigin.x + (col === 0 ? -cashStackSpacing.x / 2 : cashStackSpacing.x / 2),
        y: cashStackOrigin.y + col * cashStackColumnDrop - row * cashStackSpacing.y
      };
    }

    function drawStationEggs() {
      const visibleEggs = Math.min(game.stationEggs, 30);
      for (let i = 0; i < visibleEggs; i++) {
        const pos = getStationEggPosition(i);
        if (!drawAsset('egg', pos.x, pos.y, 30, 30, Math.PI / 2)) drawEgg(pos.x, pos.y, .86);
      }
    }

    function getCarriedCashStackOffset(index) {
      return {
        x: 0,
        y: -96 - index * 18
      };
    }

    function drawCashStack() {
      const p = game.player;
      const bob = p.moving ? Math.sin(game.time * .03) * 3 : 0;
      const visibleStacks = Math.min(game.cashStacks.length, maxVisibleCashStacks);
      for (let i = 0; i < visibleStacks; i++) {
        const offset = getCarriedCashStackOffset(i);
        const x = p.x + offset.x;
        const y = p.y + bob + offset.y;
        game.cashStacks[i].x = x;
        game.cashStacks[i].y = y;
        drawAsset('cashStack', x, y, 104, 104, cashStackRotation);
      }
    }

    function drawTopUi() {
      drawAsset('logo', logoDisplay.x, logoDisplay.y, logoDisplay.w, logoDisplay.h);
      drawAsset('cashColumn', cashDisplay.x, cashDisplay.y, cashDisplay.w, cashDisplay.h);
    }

    function drawFenceSegment(x1, y1, x2, y2) {
      ctx.save();
      ctx.lineCap = 'round';
      ctx.strokeStyle = '#9d5c2b';
      ctx.lineWidth = 8;
      ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
      ctx.strokeStyle = '#cf843e';
      ctx.lineWidth = 5;
      ctx.beginPath(); ctx.moveTo(x1, y1-6); ctx.lineTo(x2, y2-6); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(x1, y1+9); ctx.lineTo(x2, y2+9); ctx.stroke();
      const len = Math.hypot(x2-x1, y2-y1);
      const n = Math.floor(len / 42);
      for (let i = 0; i <= n; i++) {
        const t = i / Math.max(1, n);
        const x = x1 + (x2-x1)*t;
        const y = y1 + (y2-y1)*t;
        roundRect(x-6, y-24, 12, 46, 3);
        ctx.fillStyle = '#b7662f';
        ctx.fill();
        ctx.fillStyle = '#db9047';
        roundRect(x-4, y-22, 5, 42, 2);
        ctx.fill();
      }
      ctx.restore();
    }

    function drawFence() {
      drawFenceSegment(6, 133, 374, 72);
      drawFenceSegment(18, 350, 362, 284);
      drawFenceSegment(18, 487, 220, 450);
      drawFenceSegment(322, 420, 390, 404);
    }

    function drawEggZone() {
      ctx.save();
      if (!drawAsset('eggField', eggZone.x + 15, eggZone.y - 2, 250, 153)) {
        ctx.fillStyle = 'rgba(10, 76, 90, .28)';
        roundRect(eggZone.x - eggZone.rx - 7, eggZone.y - eggZone.ry - 7, eggZone.rx*2+14, eggZone.ry*2+14, 22);
        ctx.fill();
        ctx.fillStyle = '#3c3930';
        roundRect(eggZone.x - eggZone.rx, eggZone.y - eggZone.ry, eggZone.rx*2, eggZone.ry*2, 20);
        ctx.fill();
        ctx.strokeStyle = '#2ca6d8';
        ctx.lineWidth = 4;
        ctx.stroke();
        const pattern = [
          [-58,-30],[-24,-36],[10,-34],[42,-24],[62,6],[30,12],[-8,18],[-44,16],[-70,2],
          [-46,42],[-10,48],[26,43],[58,34],[-22,-2],[14,-3],[50,-2]
        ];
        for (const p of pattern) drawEgg(eggZone.x + p[0], eggZone.y + p[1], .85);
      }

      ctx.restore();
    }

    function drawCounter() {
      ctx.save();
      ctx.fillStyle = '#fff';
      ctx.strokeStyle = '#26dfff';
      ctx.lineWidth = 4;
      ctx.setLineDash([12, 8]);
      roundRect(sellPad.x - sellPad.w/2, sellPad.y - sellPad.h/2, sellPad.w, sellPad.h, 13);
      ctx.stroke();
      roundRect(cashPad.x - cashPad.w/2, cashPad.y - cashPad.h/2, cashPad.w, cashPad.h, 13);
      ctx.stroke();
      ctx.setLineDash([]);

      ctx.fillStyle = '#1fcdf3';
      ctx.font = '900 27px Arial Rounded MT Bold';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.save();
      ctx.translate(sellPad.x, sellPad.y);
      ctx.rotate(-.1);
      ctx.fillText('SELL', 0, 2);
      ctx.restore();
      ctx.fillStyle = '#1fcdf3';
      ctx.font = '900 21px Arial Rounded MT Bold';
      ctx.fillText('CASH', cashPad.x, cashPad.y + 28);

      if (!drawAsset('counter', counterZone.x, counterZone.y + 2, 150, 137)) {
        ctx.fillStyle = 'rgba(0,0,0,.18)';
        ctx.beginPath();
        ctx.ellipse(counterZone.x, counterZone.y + 76, 88, 25, 0, 0, Math.PI*2);
        ctx.fill();

        ctx.fillStyle = '#9b4e36';
        roundRect(counterZone.x - 76, counterZone.y - 10, 152, 64, 8);
        ctx.fill();
        ctx.fillStyle = '#c86d40';
        roundRect(counterZone.x - 68, counterZone.y - 2, 132, 45, 7);
        ctx.fill();
        const top = ctx.createLinearGradient(0, counterZone.y - 44, 0, counterZone.y + 2);
        top.addColorStop(0, '#9dd7f5');
        top.addColorStop(1, '#4e9cc9');
        ctx.fillStyle = top;
        roundRect(counterZone.x - 83, counterZone.y - 48, 166, 45, 9);
        ctx.fill();
        ctx.strokeStyle = 'rgba(255,255,255,.42)';
        ctx.lineWidth = 3;
        ctx.stroke();

        ctx.fillStyle = '#79838e';
        roundRect(counterZone.x + 26, counterZone.y - 72, 40, 27, 5);
        ctx.fill();
        ctx.fillStyle = '#59616d';
        roundRect(counterZone.x + 32, counterZone.y - 86, 24, 16, 4);
        ctx.fill();
        ctx.fillStyle = '#ffd870';
        ctx.fillRect(counterZone.x + 35, counterZone.y - 66, 7, 4);
        ctx.fillRect(counterZone.x + 48, counterZone.y - 66, 7, 4);

        ctx.fillStyle = '#f0c77d';
        roundRect(counterZone.x - 75, counterZone.y - 70, 54, 31, 8);
        ctx.fill();
        for (let i = 0; i < 5; i++) drawEgg(counterZone.x - 60 + (i%3)*14, counterZone.y - 61 + Math.floor(i/3)*11, .5);
      }
      ctx.restore();
    }

    function drawProductionEggs() {
      for (const egg of game.productionEggs) {
        const age = Math.max(0, game.time - egg.born);
        const appear = Math.min(1, age / 260);
        const pop = 1 + Math.sin(appear * Math.PI) * .18;
        ctx.save();
        ctx.globalAlpha = appear;
        drawEgg(egg.x, egg.y - Math.sin(appear * Math.PI) * 8, egg.s * pop);
        ctx.restore();
      }
    }

    function drawInteractionPads() {
      const p = game.player;
      if (game.carriedEggs > 0) {
        drawArrow(p.x + 24, p.y - 20, sellPad.x, sellPad.y - 16);
      } else if (game.carriedCash > 0) {
        drawArrow(p.x + 20, p.y - 24, cashPad.x, cashPad.y - 10);
      } else {
        drawArrow(p.x + 20, p.y - 30, basketZone.x, basketZone.y - 10);
      }
    }

    function drawPlayer() {
      const p = game.player;
      const bob = p.moving ? Math.sin(game.time * .03) * 3 : 0;
      ctx.save();
      ctx.translate(p.x, p.y + bob);

      ctx.fillStyle = 'rgba(0,0,0,.24)';
      ctx.beginPath();
      ctx.ellipse(0, 30 - bob, 34, 12, 0, 0, Math.PI*2);
      ctx.fill();

      const sway = p.moving ? Math.sin(game.time * .035) * .16 : 0;
      ctx.save();
      ctx.translate(0, -12);
      ctx.rotate(sway);
      if (!drawAsset('playerAvatar', 0, 0, 70, 96)) {
        ctx.fillStyle = '#efbd93';
        ctx.beginPath();
        ctx.arc(0, 0, 35, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();

      const stackBaseX = 0;
      if (game.carriedCash > 0) {
        for (let i = 0; i < game.carriedCash; i++) {
          const row = Math.floor(i / 2);
          const col = i % 2;
          const x = stackBaseX - 22 + col * 44;
          const y = -70 - row * 26;
          drawMoneyBill(x, y, 1, Math.PI / 6);
        }
      }
      if (game.carriedEggs > 0) {
        for (let i = 0; i < game.carriedEggs; i++) {
          const row = Math.floor(i / 2);
          const col = i % 2;
          const x = stackBaseX - 22 + col * 44;
          const y = -78 - row * 26;
          if (!drawAsset('egg', x, y, 40, 40, Math.PI / 2)) drawEgg(x, y, 1.25);
        }
      }
      ctx.restore();
    }

    function drawHud() {
      ctx.save();
      ctx.fillStyle = '#fff';
      ctx.font = `900 ${game.moneyPulse > 0 ? 39 : 35}px Arial Rounded MT Bold`;
      ctx.textAlign = 'left';
      ctx.textBaseline = 'middle';
      ctx.shadowColor = 'rgba(0,0,0,.62)';
      ctx.shadowBlur = 5;
      ctx.lineWidth = 4;
      ctx.strokeStyle = 'rgba(0,0,0,.28)';
      ctx.strokeText(`${game.money}`, cashDisplay.x - 10, cashDisplay.y + 1);
      ctx.fillText(`${game.money}`, cashDisplay.x - 10, cashDisplay.y + 1);
      ctx.restore();
    }

    function drawFloating() {
      ctx.save();
      for (const f of game.floating) {
        ctx.globalAlpha = f.life;
        ctx.fillStyle = f.color;
        ctx.font = '900 21px Arial Rounded MT Bold';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.shadowColor = 'rgba(0,0,0,.35)';
        ctx.shadowBlur = 4;
        ctx.fillText(f.text, f.x, f.y);
      }
      ctx.restore();

      for (const b of game.bills) drawMoneyBill(b.x, b.y, b.s, b.rot);

      for (const s of game.eggsSpark) {
        const t = ease(clamp(s.t, 0, 1));
        const x = s.sx + (s.tx - s.sx) * t;
        const y = s.sy + (s.ty - s.sy) * t - Math.sin(t * Math.PI) * 36;
        ctx.save();
        ctx.globalAlpha = s.life;
        if (s.w && !drawAsset('egg', x, y, s.w, s.h, s.rot || 0)) drawEgg(x, y, s.s);
        else if (!s.w) drawEgg(x, y, s.s);
        ctx.restore();
      }
    }

    function update(dt) {
      if (game.complete) return;
      game.time += dt * 16.67;
      game.collectTimer -= dt * 16.67;
      game.sellTimer -= dt * 16.67;
      game.cashTimer -= dt * 16.67;
      game.eggBatchTimer -= dt * 16.67;
      if (game.eggBatchTimer <= 0) {
        spawnEggBatch(eggBatchSize);
        game.eggBatchTimer = eggBatchInterval;
      }
      game.moneyPulse = Math.max(0, game.moneyPulse - dt * 16.67);

      for (const car of game.departingCars) {
        car.x += 6.0 * dt;
        car.y += 4.0 * dt;
      }
      game.departingCars = game.departingCars.filter(car => car.x < W + 190 && car.y < H + 150);
      if (game.packState === 'carLeaving' && game.departingCars.length === 0) {
        game.packState = 'idle';
      }

      if (game.packTimer > 0) {
        game.packTimer -= dt * 16.67;
        if (game.packTimer <= 0) {
          if (game.packState === 'placing') {
            game.packState = 'idle';
          } else if (game.packState === 'carLeaving') {
            game.packState = 'idle';
          } else if (game.packState === 'fullShow' && game.orderEggs >= 4) {
            game.departingCars.push({
              x: deliveryCarStart.x,
              y: deliveryCarStart.y
            });
            game.orderEggs = 0;
            game.trayEggs = 0;
            game.packState = 'carLeaving';
            game.packTimer = 500;
          }
        }
      }

      const keyX = (input.keys.has('ArrowRight') || input.keys.has('d') ? 1 : 0) - (input.keys.has('ArrowLeft') || input.keys.has('a') ? 1 : 0);
      const keyY = (input.keys.has('ArrowDown') || input.keys.has('s') ? 1 : 0) - (input.keys.has('ArrowUp') || input.keys.has('w') ? 1 : 0);
      let vx = input.x + keyX;
      let vy = input.y + keyY;
      const len = Math.hypot(vx, vy);
      if (len > 1) { vx /= len; vy /= len; }

      const p = game.player;
      p.moving = Math.hypot(vx, vy) > .05;
      if (p.moving) {
        p.dir = vx < -.05 ? -1 : vx > .05 ? 1 : p.dir;
        const nx = clamp(p.x + vx * p.speed * dt, 28, W - 28);
        const ny = clamp(p.y + vy * p.speed * dt, 105, H - 130);
        if (!isBlocked(nx, ny)) {
          p.x = nx;
          p.y = ny;
        } else {
          let moved = false;
          if (!isBlocked(nx, p.y)) { p.x = nx; moved = true; }
          if (!isBlocked(p.x, ny)) { p.y = ny; moved = true; }
          if (!moved && eggBlockRatio(p.x, p.y) <= 1 && eggBlockRatio(nx, ny) > eggBlockRatio(p.x, p.y)) {
            p.x = nx;
            p.y = ny;
          }
        }
      }

      const inPackZone = inRect(p.x, p.y, sellPad) || inRect(p.x, p.y + 25, sellPad);
      const inEggCollectZone = inRect(p.x, p.y + 25, basketZone);
      const inCashZone = inRect(p.x, p.y + 25, cashPad);

      if (inPackZone && game.carriedEggs > 0) {
        game.stationEggs += game.carriedEggs;
        game.floating.push({ x: stationEggOrigin.x + 45, y: stationEggOrigin.y - 24, text: `EGG x${game.stationEggs}`, color: '#fff6bd', life: 1, vy: -1.1 });
        game.carriedEggs = 0;
      }

      if (game.packState === 'idle' && game.packTimer <= 0 && game.stationEggs >= 2 && game.orderEggs < 4) {
        game.sellTimer = 120;
        const needEggs = 4 - game.orderEggs;
        const packCount = Math.min(2, needEggs, game.stationEggs);
        game.orderEggs += packCount;
        game.trayEggs = game.orderEggs;
        game.stationEggs -= packCount;
        if (packCount >= 2) {
          const stackPos = getCashStackPosition(game.cashStacks.length);
          game.cashStacks.push({ x: stackPos.x, y: stackPos.y, value: cashPerStack });
        }
        if (game.orderEggs >= 4) {
          game.packState = 'fullShow';
          game.packTimer = 300;
        } else {
          game.packState = 'placing';
          game.packTimer = 200;
        }
      }

      if (inEggCollectZone && game.carriedCash === 0 && game.carriedEggs < maxCarriedEggs && game.productionEggs.length > 0 && game.collectTimer <= 0) {
        game.collectTimer = collectInterval;
        const collectCount = Math.min(2, maxCarriedEggs - game.carriedEggs, game.productionEggs.length);
        for (let i = 0; i < collectCount; i++) {
          const egg = game.productionEggs.pop();
          game.carriedEggs++;
          const row = Math.floor((game.carriedEggs - 1) / 2);
          const col = (game.carriedEggs - 1) % 2;
          game.eggsSpark.push({ sx: egg.x, sy: egg.y, tx: p.x - 22 + col * 44, ty: p.y - 78 - row * 26, t: -i * 0.08, life: 1, s: 1.25, w: 40, h: 40, rot: Math.PI / 2, mode: 'toPlayer' });
        }
        game.floating.push({ x: p.x, y: p.y - 86, text: `EGG x${game.carriedEggs}`, color: '#fff6bd', life: 1, vy: -1.1 });
      } else if (inCashZone && game.cashStacks.length > 0 && game.cashTimer <= 0) {
        game.cashTimer = 100;
        const stack = game.cashStacks.shift();
        game.money += stack.value;
        game.moneyPulse = 190;
        game.floating.push({ x: stack.x, y: stack.y - 56, text: `+$${stack.value}`, color: '#52ff72', life: 1, vy: -1.45 });
        game.bills.push({ x: stack.x, y: stack.y - 32, tx: moneyTarget.x, ty: moneyTarget.y, life: 0, s: 1, rot: (Math.random()-.5)*.7, mode: 'toHud' });
        if (game.money >= game.targetMoney) {
          game.complete = true;
          setTimeout(() => winModal.classList.add('show'), 450);
        }
      }

      for (const f of game.floating) { f.y += f.vy * dt; f.life -= .018 * dt; }
      game.floating = game.floating.filter(f => f.life > 0);

      for (const b of game.bills) {
        b.life += .036 * dt;
        const t = clamp(b.life, 0, 1);
        b.x = b.x + (b.tx - b.x) * .1 * dt;
        b.y = b.y + (b.ty - b.y) * .1 * dt - Math.sin(t*Math.PI) * .6;
        b.s = Math.max(.45, b.s - t * .02);
        b.rot += .08 * dt;
      }
      game.bills = game.bills.filter(b => b.life < 1.12);

      for (const s of game.eggsSpark) {
        s.t += .07 * dt;
        s.life = 1 - Math.max(0, s.t - .82) / .18;
      }
      game.eggsSpark = game.eggsSpark.filter(s => s.t < 1);
    }

    function render() {
      ctx.clearRect(0, 0, W, H);
      drawGround();
      drawVehiclesAndOrder();
      drawTrayEggs();
      drawStationEggs();
      drawPlayer();
      drawCashStack();
      drawFloating();
      drawTopUi();
      drawHud();
    }

    let last = performance.now();
    function loop(now) {
      const dt = Math.min(2.2, (now - last) / 16.67);
      last = now;
      update(dt);
      render();
      requestAnimationFrame(loop);
    }
    requestAnimationFrame(loop);

    function setJoy(clientX, clientY) {
      const r = joy.getBoundingClientRect();
      const cx = r.left + r.width / 2;
      const cy = r.top + r.height / 2;
      const max = r.width * .33;
      let dx = clientX - cx;
      let dy = clientY - cy;
      const l = Math.hypot(dx, dy);
      if (l > max) { dx = dx / l * max; dy = dy / l * max; }
      input.x = dx / max;
      input.y = dy / max;
      knob.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
    }

    function resetJoy() {
      input.x = 0;
      input.y = 0;
      input.active = false;
      knob.style.transform = 'translate(-50%, -50%)';
    }

    joy.addEventListener('pointerdown', e => {
      input.active = true;
      joy.setPointerCapture(e.pointerId);
      setJoy(e.clientX, e.clientY);
    });
    joy.addEventListener('pointermove', e => { if (input.active) setJoy(e.clientX, e.clientY); });
    joy.addEventListener('pointerup', resetJoy);
    joy.addEventListener('pointercancel', resetJoy);

    window.addEventListener('keydown', e => input.keys.add(e.key));
    window.addEventListener('keyup', e => input.keys.delete(e.key));

    againBtn.addEventListener('click', () => {
      game.money = 0;
      game.carriedEggs = 0;
      game.carriedCash = 0;
      game.stationEggs = 0;
      game.trayEggs = 0;
      game.orderEggs = 0;
      game.packTimer = 0;
      game.packState = 'idle';
      game.cashStacks = [];
      game.carState = 'waiting';
      game.carX = deliveryCarStart.x;
      game.carY = deliveryCarStart.y;
      game.carDelay = 0;
      game.carPhase = 'down';
      game.departingCars = [];
      game.complete = false;
      game.eggBatchTimer = eggBatchInterval;
      game.productionEggs = [];
      game.player.x = 420;
      game.player.y = 620;
      game.floating = [];
      game.bills = [];
      game.eggsSpark = [];
      spawnEggBatch();
      winModal.classList.remove('show');
    });
  </script>
</body>
